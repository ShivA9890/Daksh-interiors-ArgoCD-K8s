apiVersion: autoscaling/v2 
kind: HorizontalPodAutoScaler
metadata:
  name: daksh-client-hpa 
  namespace: daksh-in
spec:
  scaleTargetRef:
    apiVersion: apps/v1 
    kind: Deployment
    name: daksh-interior-client
  minReplicas: 2
  maxReplicas: 5
  metrics:
    type: Resource 
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70 
 